<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0A0A0B">
<meta name="robots" content="noindex">
<title>404 — AiS1.52</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/base.css">
<style>
body { display: flex; min-height: 100vh; align-items: center; justify-content: center; padding: var(--sp-8); }
.nf { text-align: center; max-width: 480px; }
.nf-code { font-family: var(--ff-mono); font-size: var(--fs-display); color: var(--ac); line-height: 1; margin-bottom: var(--sp-4); letter-spacing: var(--lt-tighter); }
.nf-title { font-size: var(--fs-2xl); margin-bottom: var(--sp-3); }
.nf-text { color: var(--tx-mu); margin-bottom: var(--sp-8); }
.nf-back { display: inline-flex; align-items: center; gap: var(--sp-2); padding: var(--sp-3) var(--sp-5); border: 1px solid var(--bd-strong); font-family: var(--ff-mono); font-size: var(--fs-sm); color: var(--tx); transition: border-color var(--dur-fast) var(--ease-out), color var(--dur-fast) var(--ease-out); }
.nf-back:hover { border-color: var(--ac); color: var(--ac); }
</style>
</head>
<body>
<main class="nf">
  <div class="nf-code">404</div>
  <h1 class="nf-title">Page not found</h1>
  <p class="nf-text">The page you tried to reach doesn't exist on this domain. Let's get you back to where things work.</p>
  <a href="/" class="nf-back">← Back to home</a>
</main>
</body>
</html>
